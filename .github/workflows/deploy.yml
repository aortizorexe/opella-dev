name: "Opella DevSecOps Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: "."
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  plan-and-scan:
    name: "Terraform Plan & Checkov Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Azure Login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Inject Dynamic terraform.tfvars"
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS }}
        run: echo "$TFVARS_CONTENT" > terraform.tfvars
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: "Terraform Init & Validate"
        run: |
          terraform init
          terraform fmt -check
          terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: "Terraform Plan"
        run: terraform plan -out=tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: "Convert Plan to JSON for SAST"
        run: terraform show -json tfplan > tfplan.json
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: "Checkov SAST (Plan-based)"
        uses: bridgecrewio/checkov-action@master
        with:
          file: ${{ env.TF_WORKING_DIR }}/tfplan.json
          framework: terraform_plan
          quiet: true
          soft_fail: true

      - name: "Upload TF Plan Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  terraform-apply:
    name: "Terraform Apply"
    needs: plan-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production-approval
      url: 'https://portal.azure.com'
      
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Download TF Plan Artifact"
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: "Azure Login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: "Terraform Apply"
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}